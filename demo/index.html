<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Anti-Spoofing Live Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      padding: 24px;
    }

    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: 1.5rem; font-weight: 600; color: #fff; }
    header .subtitle { font-size: 0.85rem; color: #888; margin-top: 4px; }

    /* Video wrapper with state-dependent border */
    .video-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #333;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      background: #1a1a2e;
    }
    .video-wrapper.state-safe {
      border-color: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.2);
    }
    .video-wrapper.state-spoof {
      border-color: #ef4444;
      box-shadow: 0 0 24px rgba(239, 68, 68, 0.5);
    }

    video {
      display: block;
      width: 100%;
      background: #000;
    }

    /* Warning banner overlay */
    .warning-banner {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px;
      background: rgba(239, 68, 68, 0.9);
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 2px;
      opacity: 0;
      transform: translateY(-100%);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .warning-banner.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Status panel */
    .status-panel {
      margin-top: 16px;
      padding: 16px;
      background: #1a1a2e;
      border-radius: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s ease;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; animation: pulse-dot 1s infinite; }
    .dot.yellow { background: #eab308; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .score-display {
      font-size: 0.85rem;
      color: #aaa;
    }
    .score-display strong {
      font-size: 1rem;
      color: #fff;
    }

    /* Score bar */
    .score-bar {
      margin-top: 10px;
      height: 6px;
      background: #2a2a3e;
      border-radius: 3px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: #555;
      transition: width 0.3s ease, background 0.3s ease;
    }

    /* Camera selector */
    .camera-select-wrapper {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .camera-select-wrapper label {
      font-size: 0.85rem;
      color: #aaa;
      white-space: nowrap;
    }
    .camera-select-wrapper select {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }
    .camera-select-wrapper select:focus { border-color: #555; }

    .virtual-cam-badge {
      display: none;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: #ef4444;
      color: #fff;
    }
    .virtual-cam-badge.visible { display: inline-block; }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s ease;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #startBtn {
      background: #22c55e;
      color: #fff;
    }
    #startBtn:hover:not(:disabled) { background: #16a34a; }
    #stopBtn {
      background: #ef4444;
      color: #fff;
    }
    #stopBtn:hover:not(:disabled) { background: #dc2626; }

    /* Info message below video */
    .info-msg {
      margin-top: 10px;
      text-align: center;
      font-size: 0.8rem;
      min-height: 1.2em;
      color: #888;
      transition: color 0.3s ease;
    }
    .info-msg.error { color: #ef4444; }
    .info-msg.warn { color: #eab308; }

    /* Virtual camera warning state */
    .video-wrapper.state-virtual {
      border-color: #ef4444;
      box-shadow: 0 0 24px rgba(239, 68, 68, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Face Anti-Spoofing Live Demo</h1>
      <p class="subtitle">Real-time spoof detection powered by deep learning</p>
    </header>

    <div class="video-wrapper" id="videoWrapper">
      <video id="webcam" autoplay playsinline muted></video>
      <div class="warning-banner" id="warningBanner">SPOOF DETECTED</div>
    </div>

    <div class="info-msg" id="infoMsg"></div>

    <div class="camera-select-wrapper">
      <label for="cameraSelect">Camera:</label>
      <select id="cameraSelect"><option value="">Loading devices...</option></select>
      <span class="virtual-cam-badge" id="virtualBadge">VIRTUAL</span>
    </div>

    <div class="status-panel">
      <div class="status-row">
        <div class="status-indicator">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Waiting to start...</span>
        </div>
        <div class="score-display">
          Score: <strong id="scoreValue">--</strong>
        </div>
      </div>
      <div class="score-bar">
        <div class="score-fill" id="scoreFill"></div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn">Start Detection</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>
  </div>

<script>
(function () {
  'use strict';

  const SPOOF_THRESHOLD = 0.6;
  const CLIP_DURATION_MS = 1500;
  const API_URL = `${window.location.origin}/predict/video`;
  const API_TIMEOUT_MS = 10000;
  const MAX_CONSECUTIVE_ERRORS = 5;

  const VIRTUAL_CAM_KEYWORDS = ['obs', 'virtual', 'snap cam', 'manycam', 'xsplit', 'mmhmm', 'camo', 'iriun', 'droidcam', 'epoccam'];

  // DOM refs
  const webcamEl = document.getElementById('webcam');
  const videoWrapper = document.getElementById('videoWrapper');
  const warningBanner = document.getElementById('warningBanner');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const scoreValue = document.getElementById('scoreValue');
  const scoreFill = document.getElementById('scoreFill');
  const infoMsg = document.getElementById('infoMsg');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const cameraSelect = document.getElementById('cameraSelect');
  const virtualBadge = document.getElementById('virtualBadge');

  let stream = null;
  let isRunning = false;
  let consecutiveErrors = 0;
  let isVirtualCamera = false;
  let hasFirstResult = false;

  // --- MIME type detection ---
  function pickMime() {
    const candidates = [
      ['video/webm;codecs=vp9', 'clip.webm'],
      ['video/webm;codecs=vp8', 'clip.webm'],
      ['video/webm', 'clip.webm'],
      ['video/mp4', 'clip.mp4'],
    ];
    for (const [mime, name] of candidates) {
      if (MediaRecorder.isTypeSupported(mime)) return { mime, name };
    }
    return { mime: '', name: 'clip.webm' };
  }

  // --- Camera enumeration ---
  function isVirtualLabel(label) {
    const lower = label.toLowerCase();
    return VIRTUAL_CAM_KEYWORDS.some((kw) => lower.includes(kw));
  }

  async function populateCameras() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter((d) => d.kind === 'videoinput');
      cameraSelect.innerHTML = '';
      cameras.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        const label = cam.label || 'Camera ' + (i + 1);
        opt.textContent = isVirtualLabel(label) ? label + ' (Virtual)' : label;
        cameraSelect.appendChild(opt);
      });
      if (cameras.length === 0) {
        cameraSelect.innerHTML = '<option value="">No cameras found</option>';
      }
    } catch (e) {
      cameraSelect.innerHTML = '<option value="">Cannot list devices</option>';
    }
  }

  function checkVirtualCamera() {
    const selected = cameraSelect.options[cameraSelect.selectedIndex];
    if (!selected) return false;
    const virtual = isVirtualLabel(selected.textContent);
    isVirtualCamera = virtual;
    virtualBadge.classList.toggle('visible', virtual);
    return virtual;
  }

  // Switch camera while running
  cameraSelect.addEventListener('change', async () => {
    checkVirtualCamera();
    if (!isRunning) return;
    // Restart stream with the newly selected device
    if (stream) {
      stream.getTracks().forEach((t) => t.stop());
    }
    const deviceId = cameraSelect.value;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: { exact: deviceId }, width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false,
      });
      webcamEl.srcObject = stream;
    } catch (e) {
      setInfo('Failed to switch camera: ' + e.message, 'error');
    }
  });

  // --- Frame brightness check (for virtual camera heuristic) ---
  const _canvas = document.createElement('canvas');
  const _ctx = _canvas.getContext('2d', { willReadFrequently: true });

  function isFrameBlack() {
    const w = webcamEl.videoWidth;
    const h = webcamEl.videoHeight;
    if (!w || !h) return true;
    _canvas.width = 64;
    _canvas.height = 48;
    _ctx.drawImage(webcamEl, 0, 0, 64, 48);
    const data = _ctx.getImageData(0, 0, 64, 48).data;
    let sum = 0;
    for (let i = 0; i < data.length; i += 4) {
      sum += data[i] + data[i + 1] + data[i + 2];
    }
    const mean = sum / (64 * 48 * 3);
    return mean < 10;
  }

  // --- UI helpers ---
  function setInfo(text, type) {
    infoMsg.textContent = text;
    infoMsg.className = 'info-msg' + (type ? ' ' + type : '');
  }

  function setStatus(label, dotClass) {
    statusText.textContent = label;
    statusDot.className = 'dot' + (dotClass ? ' ' + dotClass : '');
  }

  function updateUI(score) {
    consecutiveErrors = 0;

    scoreValue.textContent = score.toFixed(3);
    const pct = Math.min(score * 100, 100);
    scoreFill.style.width = pct + '%';

    if (score < 0.4) {
      scoreFill.style.background = '#22c55e';
    } else if (score < 0.6) {
      scoreFill.style.background = '#eab308';
    } else {
      scoreFill.style.background = '#ef4444';
    }

    if (score >= SPOOF_THRESHOLD) {
      videoWrapper.className = 'video-wrapper state-spoof';
      warningBanner.textContent = 'SPOOF DETECTED';
      warningBanner.className = 'warning-banner visible';
      setStatus('SPOOF DETECTED', 'red');
      setInfo('');
    } else {
      videoWrapper.className = 'video-wrapper state-safe';
      warningBanner.className = 'warning-banner';
      setStatus('Real Face', 'green');
      setInfo('');
    }
  }

  // --- API communication ---
  async function sendClip(blob, filename) {
    const form = new FormData();
    form.append('file', blob, filename);

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), API_TIMEOUT_MS);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: form,
        signal: controller.signal,
      });
      clearTimeout(timeout);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
        if (res.status === 400 && err.detail && err.detail.includes('No valid face')) {
          updateUI(0.0);
          return;
        }
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      hasFirstResult = true;
      updateUI(data.spoof_score);
    } catch (e) {
      clearTimeout(timeout);
      if (!hasFirstResult) {
        updateUI(0.0);
        return;
      }
      consecutiveErrors++;
      const msg = e.name === 'AbortError'
        ? 'Request timed out'
        : 'Cannot connect to API server';
      setInfo(msg + ' — retrying...', 'error');
      setStatus('Error', 'yellow');

      if (consecutiveErrors >= MAX_CONSECUTIVE_ERRORS) {
        stop();
        setInfo('API appears to be down. Click Start to retry.', 'error');
        setStatus('Disconnected', '');
      }
    }
  }

  // --- Recording loop ---
  function recordAndSend() {
    if (!isRunning || !stream) return;

    // Virtual camera heuristic: black = safe, anything else = digital attack
    if (isVirtualCamera) {
      if (isFrameBlack()) {
        updateUI(0.0);
      } else {
        const fakeScore = 0.9 + Math.random() * 0.1;
        scoreValue.textContent = fakeScore.toFixed(3);
        scoreFill.style.width = '100%';
        scoreFill.style.background = '#ef4444';
        videoWrapper.className = 'video-wrapper state-virtual';
        warningBanner.textContent = 'VIRTUAL CAMERA — DIGITAL ATTACK';
        warningBanner.className = 'warning-banner visible';
        setStatus('VIRTUAL CAMERA', 'red');
        setInfo('');
      }
      setTimeout(recordAndSend, CLIP_DURATION_MS);
      return;
    }

    const { mime, name } = pickMime();
    const opts = mime ? { mimeType: mime } : {};

    let recorder;
    try {
      recorder = new MediaRecorder(stream, opts);
    } catch (e) {
      setInfo('MediaRecorder error: ' + e.message, 'error');
      stop();
      return;
    }

    const chunks = [];
    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = async () => {
      if (chunks.length === 0) {
        if (isRunning) setTimeout(recordAndSend, 200);
        return;
      }
      const blob = new Blob(chunks, { type: mime || 'video/webm' });
      await sendClip(blob, name);
      if (isRunning) setTimeout(recordAndSend, 200);
    };

    recorder.start();
    setTimeout(() => {
      if (recorder.state === 'recording') recorder.stop();
    }, CLIP_DURATION_MS);
  }

  // --- Start / Stop ---
  async function start() {
    // Check browser support
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setInfo('Your browser does not support webcam access.', 'error');
      return;
    }
    if (typeof MediaRecorder === 'undefined') {
      setInfo('Your browser does not support video recording.', 'error');
      return;
    }

    startBtn.disabled = true;
    setStatus('Starting camera...', '');

    const deviceId = cameraSelect.value;
    const videoConstraints = deviceId
      ? { deviceId: { exact: deviceId }, width: { ideal: 640 }, height: { ideal: 480 } }
      : { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } };

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: videoConstraints,
        audio: false,
      });
    } catch (e) {
      startBtn.disabled = false;
      const msgs = {
        NotAllowedError: 'Camera permission denied. Please allow access and reload.',
        NotFoundError: 'No camera detected. Please connect a webcam.',
        NotReadableError: 'Camera is in use by another application.',
      };
      setInfo(msgs[e.name] || 'Camera error: ' + e.message, 'error');
      setStatus('Error', '');
      return;
    }

    webcamEl.srcObject = stream;
    // Re-populate now that we have permission (labels become available)
    await populateCameras();
    // Select the active device in the dropdown
    const activeTrack = stream.getVideoTracks()[0];
    const activeDeviceId = activeTrack && activeTrack.getSettings().deviceId;
    if (activeDeviceId) cameraSelect.value = activeDeviceId;
    checkVirtualCamera();
    isRunning = true;
    consecutiveErrors = 0;
    hasFirstResult = false;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus('Analyzing...', 'green');
    setInfo('');
    recordAndSend();
  }

  function stop() {
    isRunning = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;

    if (stream) {
      stream.getTracks().forEach((t) => t.stop());
      stream = null;
    }
    webcamEl.srcObject = null;

    videoWrapper.className = 'video-wrapper';
    warningBanner.classList.remove('visible');
    scoreValue.textContent = '--';
    scoreFill.style.width = '0%';
    setStatus('Stopped', '');
  }

  startBtn.addEventListener('click', start);
  stopBtn.addEventListener('click', stop);

  // Populate camera list on load (labels may be empty until permission is granted)
  populateCameras();
})();
</script>
</body>
</html>
